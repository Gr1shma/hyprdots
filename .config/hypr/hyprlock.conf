general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 7
    brightness = 0.5
}

input-field {
    monitor =
    size = 300, 45
    outline_thickness = 0
    dots_size = 0.2
    dots_spacing = 0.2
    rounding = 0
    outer_color = rgb(000000)
    inner_color = rgb(000000)
    font_color = rgb(ffffff)
    fade_on_empty = true
    placeholder_text =
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 72
    font_family = JetBrains Mono
    position = 0, 100
    halign = center
    valign = center
}
