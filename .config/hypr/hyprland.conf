env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = HYPRSHOT_DIR,/home/grishma/pix/ss

monitor=eDP-1,preferred,auto,1.6
monitor=HDMI-A-1,1920x1080@50,0x0,1.6,mirror,eDP-1

exec-once = dbus-update-activation-environment --systemd --all
exec-once = swayidle -w timeout 300 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on'
exec-once = (syncthing & hyprpaper & waybar)
exec-once = sleep 1 && hyprstyle

exec-once = cclipd -s 2 -t "image/png" -t "image/*" -t "text/plain;charset=utf-8" -t "text/*" -t "*"

xwayland {
  force_zero_scaling = true
}

$terminal = foot
$menu = foot --app-id otter-launcher -T foot zsh -c 'source ~/.config/zsh/.zshrc; otter-launcher'
$fileManager = foot -T foot zsh -c 'source ~/.config/zsh/.zshrc; yazi'

env = XCURSOR_SIZE,21
env = QT_QPA_PLATFORMTHEME,qt5ct
env = ELECTRON_OZONE_PLATFORM_HINT , auto

exec = gsettings set org.gnome.desktop.interface gtk-theme "Arc-Darkest"
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"

env = QT_QPA_PLATFORMTHEME,qt6ct

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options=ctrl:nocaps
    kb_rules =

    follow_mouse = 1

    sensitivity = 0.2

    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 2
    gaps_out = 5

    border_size = 1
    col.active_border = rgba(dc8e3cee) rgba(e18b57ee) 45deg
    col.inactive_border = rgba(a89791aa)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 0

    blur {
        enabled = false
        size = 3
        passes = 1
    }
}

windowrule = opacity 0.85 0.85, match:class ^(foot)$

windowrule {
    name = otter
    match:class = ^(otter-launcher)$
    float = on
    center = on
    opacity = 0.85 0.85
    border_size = 0
    size = 400 400
}

animations {
    enabled = no,
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    # new_is_master = true
    # new_status = master
}

misc {
    force_default_wallpaper = 0
    enable_swallow = true
}

gesture = 4, horizontal, workspace,

device {
    name = epic-mouse-v1
    sensitivity = -0.8
}

$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Space, exec, $menu
bind = $mainMod SHIFT, P,exec,hyprctl switchxkblayout current next

bind = $mainMod SHIFT, W, exec, firefox

bind = $mainMod, W, exec, hyprstyle

bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, Q, exit,

bind = $mainMod SHIFT, A, exec, foot --app-id floating-term -e emoji -c
bind = $mainMod, B, exec, foot --app-id floating-term -e bookmark
bind = $mainMod, I, exec, foot --app-id floating-term -e wifimenu
bind = $mainMod, P, exec, foot --app-id floating-term -e power_menu
bind = $mainMod, N, exec, foot --app-id floating-term -e search_notes

windowrule {
    name = floating-term
    match:class = ^(floating-term)$
    float = on
    center = on
    size = 600 400
    opacity = 0.85 0.85
}


bind = $mainMod, TAB,workspace,previous
bind = $mainMod, G, exec, killall waybar || waybar
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod, V, togglefloating,
bind = $mainMod, U, pseudo, # dwindle
bind = $mainMod, D, togglesplit, # dwindle

# Screenshot and clipboard
bind = $mainMod, PRINT, exec, hyprshot -m output
bind = , PRINT, exec, hyprshot -m region
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m region --clipboard-only
bind = CTRL SHIFT, S, exec, hyprshot -m region --clipboard-only

# Audio
bindel =, XF86AudioRaiseVolume, exec, pamixer -i 5
bindel =, XF86AudioLowerVolume, exec, pamixer -d 5
bindl =, XF86AudioMute, exec, pamixer -t

bindel =, SHIFT_XF86AudioRaiseVolume, exec, pamixer --default-source --increase 2
bindel =, SHIFT_XF86AudioLowerVolume, exec, pamixer --default-source --decrease 2
bindl =, SHIFT_XF86AudioMute, exec, pamixer --default-source -t

# Laptop multimedia keys for volume and LCD brightners
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-


# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod CTRL, k, resizeactive, 30 0
bind = $mainMod CTRL, j, resizeactive, -30 0

windowrule {
    name = suppress-maximize-events

    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags

    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule = workspace 3, match:class ^(firefox)$
windowrule = workspace 3, match:class ^(zen)$
