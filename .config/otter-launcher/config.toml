[general]
default_module = "app"
empty_module = "a"
exec_cmd = "zsh -c"
vi_mode = true
esc_to_abort = true
cheatsheet_entry = "?"
cheatsheet_viewer = "less -R; clear"
clear_screen_after_execution = false
loop_mode = false
external_editor = ""

[interface]
header = """
 \u001B[34;1m  >\u001B[0m $USER@$(echo $HOSTNAME)                \u001B[31m\u001B[0m $(cat /proc/loadavg | cut -d ' ' -f 1)  \u001B[33m\U000F035B\u001B[0m $(free -h | awk 'FNR == 2 {print $3}' | sed 's/i//')
    \u001B[34;1m>\u001B[0;1m """
header_cmd = "cat ~/.cache/wal/sequences 2>/dev/null"
header_cmd_trimmed_lines = 0
header_concatenate = false
list_prefix = "      "
selection_prefix = "    \u001B[31;1m> "
place_holder = "type and search"
default_module_message = "      \u001B[33msearch\u001B[0m the internet"
empty_module_message = ""
suggestion_mode = "list"
suggestion_lines = 12
indicator_with_arg_module = "\u001B[31m^\u001B[0m "
indicator_no_arg_module = "\u001B[31m$\u001B[0m "
prefix_padding = 3
prefix_color = "\u001B[33m"
description_color = "\u001B[39m"
place_holder_color = "\u001B[30m"
hint_color = "\u001B[30m"
move_right = 0
move_up = 0

[[modules]]
description = "search with google"
prefix = "g"
cmd = "xdg-open 'https://google.com/search?q={}'"
with_argument = true
url_encode = true

[[modules]]
description = "search youtube"
prefix = "yt"
cmd = "xdg-open 'https://www.youtube.com/search?q={}'"
with_argument = true
url_encode = true

[[modules]]
description = "search youtube music"
prefix = "ym"
cmd = "xdg-open 'https://music.youtube.com/search?q={}'"
with_argument = true
url_encode = true

[[modules]]
description = "kill a running app"
prefix = "k"
cmd = 'ps -u "$USER" -o comm= | sort -u | fsel --dmenu | xargs -r pkill -9'
with_argument = false

[[modules]]
description = "launch apps with fsel"
prefix = "app"
cmd = "fsel -vv -r -d -ss \"{}\""
with_argument = true

[[modules]]
description = "launch apps instantly"
prefix = "a"
cmd = "fsel -vv -r -d -p {}"
with_argument = true

[[modules]]
description = "manage clipboard with fsel"
prefix = "cl"
cmd = "fsel --cclip"
with_argument = false

[[modules]]
description = "find pkgs"
prefix = "pm"
cmd = "paru -SD {}"
with_argument = true

[[modules]]
description = "install pkgs"
prefix = "i"
cmd = "paru -S {}"
with_argument = true

[[modules]]
description = "power menu with fzf"
prefix = "p"
cmd = "power_menu"
with_argument = false

[[modules]]
description = "run command in terminal"
prefix = "s"
cmd = "setsid -f foot -e {}"
with_argument = true

[[modules]]
description = "search archwiki"
prefix = "w"
cmd = "xdg-open 'https://wiki.archlinux.org/index.php?search={}'"
with_argument = true
url_encode = true

[[modules]]
description = "cambridge dictionary"
prefix = "dc"
cmd = "xdg-open 'https://dictionary.cambridge.org/dictionary/english/{}'"
with_argument = true
url_encode = true

[[modules]]
description = "search notes"
prefix = "n"
cmd = "search_notes"
with_argument = false

[[modules]]
description = "wifi manager"
prefix = "wi"
cmd = "wifimenu"
with_argument = false

[[modules]]
description = "bookmarks"
prefix = "bm"
cmd = "bookmark"
with_argument = false
